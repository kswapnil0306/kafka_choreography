services:
  mysql:
    image: mysql:8.0
    container_name: untitled-mysql
    environment:
      MYSQL_ROOT_PASSWORD: igdefault
      MYSQL_DATABASE: appdb
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pigdefault"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  app:
    build: .
    container_name: untitled-app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: appdb
      MYSQL_USER: root
      MYSQL_PASSWORD: igdefault
